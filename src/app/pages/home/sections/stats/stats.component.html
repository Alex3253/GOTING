<section class="bg-teal-700">
  <div class="mx-auto max-w-7xl px-6 py-16 grid grid-cols-2 lg:grid-cols-4 gap-10 text-center text-white">
    @for (stat of stats; track stat.label) {
      <div>
        <p class="text-4xl sm:text-5xl font-bold">{{ stat.value }}</p>
        <p class="mt-2 text-sm text-teal-100">{{ stat.label }}</p>
      </div>
    }
  </div>
</section>
